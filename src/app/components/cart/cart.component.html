<!-- Overlay -->
@if (isOpen) {
  <div class="cart-overlay" (click)="close()"></div>
}

<!-- Sidebar -->
<div class="cart-sidebar" [class.open]="isOpen">
  <div class="cart-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0"><i class="fas fa-shopping-cart me-2"></i>Your Cart</h5>
    <button class="btn-close-cart" (click)="close()"><i class="fas fa-times"></i></button>
  </div>

  <div class="cart-body">
    @if (items.length === 0) {
      <div class="empty-cart text-center py-4">
        <i class="fas fa-shopping-cart fa-3x mb-3" style="color: var(--border)"></i>
        <p class="text-muted">Your cart is empty.</p>
      </div>
    } @else {
      @for (item of items; track item.product.id) {
        <div class="cart-item d-flex gap-2 align-items-center">
          <img [src]="item.product.image" [alt]="item.product.name" class="cart-item-img" />
          <div class="flex-grow-1">
            <div class="cart-item-name">{{ item.product.name }}</div>
            <div class="cart-item-price">${{ item.product.price | number:'1.2-2' }}</div>
          </div>
          <div class="d-flex align-items-center gap-1">
            <button class="qty-btn" (click)="updateQty(item.product.id, item.quantity - 1)">−</button>
            <span class="qty-val">{{ item.quantity }}</span>
            <button class="qty-btn" (click)="updateQty(item.product.id, item.quantity + 1)">+</button>
          </div>
          <button class="remove-btn" (click)="remove(item.product.id)"><i class="fas fa-trash"></i></button>
        </div>
      }
    }
  </div>

  @if (items.length > 0) {
    <div class="cart-footer">
      <div class="d-flex justify-content-between mb-3">
        <strong>Total:</strong>
        <strong>${{ total | number:'1.2-2' }}</strong>
      </div>
      <button class="btn btn-primary w-100 mb-2">Checkout</button>
      <button class="btn btn-outline-secondary w-100 btn-sm" (click)="clear()">Clear Cart</button>
    </div>
  }
</div>

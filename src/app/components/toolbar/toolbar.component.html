<div class="toolbar-strip">
  <div class="toolbar-inner">

    <div class="toolbar-left">
      <button class="toolbar-btn" [class.active]="isGrayscale" (click)="toggleGrayscale()">
        <i class="fas fa-circle-half-stroke"></i> Grayscale
      </button>
      <span class="toolbar-sep">|</span>
      <span class="toolbar-label">Text:</span>
      <button class="toolbar-btn font-sm" [class.active]="currentFont === 'small'" (click)="setFont('small')" title="Small text">A</button>
      <button class="toolbar-btn font-md" [class.active]="currentFont === 'normal'" (click)="setFont('normal')" title="Normal text">A</button>
      <button class="toolbar-btn font-lg" [class.active]="currentFont === 'large'" (click)="setFont('large')" title="Large text">A</button>
    </div>

    <div class="toolbar-right">
      <span class="toolbar-label">Theme:</span>
      <button class="toolbar-btn theme-light" [class.active]="currentTheme === 'light'" (click)="setTheme('light')">
        <i class="fas fa-sun"></i> Light
      </button>
      <button class="toolbar-btn theme-dark" [class.active]="currentTheme === 'dark'" (click)="setTheme('dark')">
        <i class="fas fa-moon"></i> Dark
      </button>
    </div>

  </div>
</div>

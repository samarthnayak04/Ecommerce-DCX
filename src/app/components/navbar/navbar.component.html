<!-- Login Header Bar -->
<div class="login-bar">
  <div class="login-inner">

    <!-- Brand -->
    <a routerLink="/home" class="brand">
      <div class="brand-icon-wrap">
        <i class="fas fa-bolt"></i>
      </div>
      <div>
        <div class="brand-name">DCX Store</div>
        <div class="brand-tagline">Electronics &amp; Gadgets</div>
      </div>
    </a>

    <!-- Login / User -->
    <div class="auth-zone">
      @if (!currentUser) {
        <div class="login-form">
          <div class="login-field">
            <i class="fas fa-envelope field-icon"></i>
            <input type="email" class="form-control login-input" placeholder="Email"
                   [(ngModel)]="email" (keyup.enter)="onLogin()" autocomplete="username" />
          </div>
          <div class="login-field">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" class="form-control login-input" placeholder="Password"
                   [(ngModel)]="password" (keyup.enter)="onLogin()" autocomplete="current-password" />
          </div>
          <button class="btn btn-primary btn-sm login-btn" (click)="onLogin()">
            <i class="fas fa-sign-in-alt"></i> Sign In
          </button>
        </div>
        @if (loginError) {
          <span class="login-error"><i class="fas fa-exclamation-circle"></i> {{ loginError }}</span>
        }
      } @else {
        <div class="user-zone">
          <div class="user-avatar">{{ currentUser.name.charAt(0).toUpperCase() }}</div>
          <span class="welcome-text">Hi, <strong>{{ currentUser.name }}</strong></span>
          <button class="btn btn-outline-secondary btn-sm" (click)="onLogout()">
            <i class="fas fa-sign-out-alt"></i> Sign out
          </button>
        </div>
      }
    </div>

  </div>
</div>

<!-- Main Navigation Bar -->
<nav class="main-nav">
  <div class="nav-inner">

    <!-- Nav links -->
    <ul class="nav-links">
      <li>
        <a routerLink="/home" routerLinkActive="active-link">
          <i class="fas fa-home"></i> Home
        </a>
      </li>
      <li>
        <a routerLink="/products" routerLinkActive="active-link">
          <i class="fas fa-th-large"></i> Products
        </a>
      </li>
      <li>
        <a routerLink="/account" routerLinkActive="active-link">
          <i class="fas fa-user"></i> My Account
        </a>
      </li>
    </ul>

    <!-- Search bar -->
    <div class="search-wrap">
      <i class="fas fa-search search-icon"></i>
      <input type="text" class="form-control search-input"
             placeholder="Search phones, laptops, gaming..."
             [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" />
      <button class="search-btn" (click)="onSearch()">Search</button>
    </div>

    <!-- Cart -->
    <button class="cart-btn" (click)="openCart()">
      <i class="fas fa-shopping-cart"></i>
      <span class="cart-label">Cart</span>
      @if (cartCount > 0) {
        <span class="cart-badge">{{ cartCount }}</span>
      }
    </button>

  </div>
</nav>
